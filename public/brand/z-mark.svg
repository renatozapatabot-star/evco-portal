<?xml version="1.0" encoding="UTF-8"?>
<!--
  ZAPATA AI brand mark — layered metallic gold Z (April 2026 redesign).

  Five nested Z strokes form the silhouette. Each stroke is a polished
  gold rail with its own highlight + shadow gradient, dark grooves between
  rails for the cast-metal "ribbed" look, and a top-left light source
  bias matching the source reference.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" fill="none" aria-label="ZAPATA AI">
  <defs>
    <!-- Bright catchlight gradient (top of every rail) -->
    <linearGradient id="z-rail-bright" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#FFE9A3" />
      <stop offset="0.4" stop-color="#F4D47A" />
      <stop offset="0.7" stop-color="#C9A74A" />
      <stop offset="1" stop-color="#8F7628" />
    </linearGradient>
    <!-- Mid rail gradient -->
    <linearGradient id="z-rail-mid" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#F4D47A" />
      <stop offset="0.5" stop-color="#C9A74A" />
      <stop offset="1" stop-color="#6B5818" />
    </linearGradient>
    <!-- Diagonal stroke uses an angled gradient for proper metal sheen -->
    <linearGradient id="z-diag" x1="40" y1="60" x2="160" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFE9A3" />
      <stop offset="0.5" stop-color="#C9A74A" />
      <stop offset="1" stop-color="#6B5818" />
    </linearGradient>
    <linearGradient id="z-diag-bright" x1="40" y1="60" x2="160" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF3BE" />
      <stop offset="0.45" stop-color="#F4D47A" />
      <stop offset="1" stop-color="#8F7628" />
    </linearGradient>
    <!-- Subtle halo behind the Z -->
    <radialGradient id="z-halo" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0" stop-color="#C9A74A" stop-opacity="0.18" />
      <stop offset="0.6" stop-color="#C9A74A" stop-opacity="0.04" />
      <stop offset="1" stop-color="#C9A74A" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Halo -->
  <rect x="0" y="0" width="200" height="200" fill="url(#z-halo)" />

  <!--
    Five nested Z silhouettes, outer to inner. Each consists of:
      - a top horizontal bar
      - a diagonal stroke
      - a bottom horizontal bar
    Drawn as polylines so a single gradient sweeps the whole Z.
    Italic lean: diagonal tilts ~10° from vertical (ends at x diff ≈ 100 over y diff ≈ 110).
  -->

  <!-- Layer 1 — outer shell (darkest top, brightest bottom for grounding) -->
  <g stroke-linecap="round" stroke-linejoin="round" fill="none">
    <polyline points="34,32 166,32" stroke="url(#z-rail-mid)" stroke-width="9" />
    <polyline points="158,40 50,160" stroke="url(#z-diag)" stroke-width="9" />
    <polyline points="34,168 166,168" stroke="url(#z-rail-mid)" stroke-width="9" />
  </g>

  <!-- Layer 2 — bright outer edge, the "catchlight" rail -->
  <g stroke-linecap="round" stroke-linejoin="round" fill="none">
    <polyline points="42,46 158,46" stroke="url(#z-rail-bright)" stroke-width="8" />
    <polyline points="150,54 56,146" stroke="url(#z-diag-bright)" stroke-width="8" />
    <polyline points="42,154 158,154" stroke="url(#z-rail-bright)" stroke-width="8" />
  </g>

  <!-- Groove (dark) — gives the ribbed metallic look between layer 2 and 3 -->
  <g stroke="#0A0703" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.55">
    <polyline points="48,55 152,55" stroke-width="1.3" />
    <polyline points="146,60 60,140" stroke-width="1.3" />
    <polyline points="48,145 152,145" stroke-width="1.3" />
  </g>

  <!-- Layer 3 — middle rail -->
  <g stroke-linecap="round" stroke-linejoin="round" fill="none">
    <polyline points="52,62 148,62" stroke="url(#z-rail-bright)" stroke-width="7" />
    <polyline points="142,68 64,132" stroke="url(#z-diag-bright)" stroke-width="7" />
    <polyline points="52,138 148,138" stroke="url(#z-rail-bright)" stroke-width="7" />
  </g>

  <!-- Groove between 3 and 4 -->
  <g stroke="#0A0703" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.55">
    <polyline points="58,72 142,72" stroke-width="1.1" />
    <polyline points="138,76 70,124" stroke-width="1.1" />
    <polyline points="58,128 142,128" stroke-width="1.1" />
  </g>

  <!-- Layer 4 — inner -->
  <g stroke-linecap="round" stroke-linejoin="round" fill="none">
    <polyline points="62,80 138,80" stroke="url(#z-rail-mid)" stroke-width="6" />
    <polyline points="132,86 72,114" stroke="url(#z-diag)" stroke-width="6" />
    <polyline points="62,120 138,120" stroke="url(#z-rail-mid)" stroke-width="6" />
  </g>

  <!-- Layer 5 — center core, brightest -->
  <g stroke-linecap="round" stroke-linejoin="round" fill="none">
    <polyline points="74,94 126,94" stroke="url(#z-rail-bright)" stroke-width="5" />
    <polyline points="122,98 80,104" stroke="url(#z-diag-bright)" stroke-width="5" />
    <polyline points="74,106 126,106" stroke="url(#z-rail-bright)" stroke-width="5" />
  </g>

  <!-- Specular highlights — light-source pin-points -->
  <circle cx="50" cy="33" r="1.8" fill="#FFF3BE" opacity="0.95" />
  <circle cx="160" cy="48" r="1.5" fill="#FFF3BE" opacity="0.85" />
  <circle cx="80" cy="120" r="1.2" fill="#FFF3BE" opacity="0.7" />

  <!-- Bottom-right cast shadow accent (tiny darker arc) -->
  <ellipse cx="156" cy="172" rx="14" ry="3" fill="#000" opacity="0.4" filter="url(#none)" />
</svg>
