<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" fill="none" aria-label="ZAPATA AI">
  <defs>
    <linearGradient id="z-gold" x1="40" y1="20" x2="160" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F4D47A" />
      <stop offset="0.45" stop-color="#C9A74A" />
      <stop offset="1" stop-color="#8F7628" />
    </linearGradient>
    <linearGradient id="z-highlight" x1="60" y1="30" x2="110" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFE9A3" stop-opacity="0.9" />
      <stop offset="1" stop-color="#FFE9A3" stop-opacity="0" />
    </linearGradient>
    <filter id="z-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" />
    </filter>
  </defs>

  <!-- Soft central halo -->
  <ellipse cx="100" cy="100" rx="95" ry="85" fill="#C9A74A" opacity="0.08" filter="url(#z-glow)" />

  <!-- Main Z body (italicized) -->
  <path
    d="M50 42 L150 42 L150 58 L88 145 L150 145 L150 163 L50 163 L50 147 L112 60 L50 60 Z"
    fill="url(#z-gold)"
    stroke="#FFE9A3"
    stroke-width="0.5"
    stroke-opacity="0.35"
  />

  <!-- Highlight sheen on upper bar -->
  <path
    d="M50 42 L150 42 L150 58 L55 58 Z"
    fill="url(#z-highlight)"
  />

  <!-- Circuit traces — top left -->
  <g stroke="#F4D47A" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.9">
    <path d="M30 38 L48 38" />
    <path d="M20 44 L48 44" />
    <path d="M34 50 L48 50" />
    <circle cx="30" cy="38" r="1.5" fill="#FFE9A3" />
    <circle cx="20" cy="44" r="1.5" fill="#FFE9A3" />
  </g>

  <!-- Circuit traces — bottom right -->
  <g stroke="#F4D47A" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.9">
    <path d="M152 157 L170 157" />
    <path d="M152 163 L180 163" />
    <path d="M152 169 L168 169" />
    <circle cx="170" cy="157" r="1.5" fill="#FFE9A3" />
    <circle cx="180" cy="163" r="1.5" fill="#FFE9A3" />
  </g>

  <!-- Lens flare dots -->
  <circle cx="140" cy="50" r="2" fill="#FFF3BE" opacity="0.85" />
  <circle cx="55" cy="155" r="1.5" fill="#FFF3BE" opacity="0.8" />
</svg>
