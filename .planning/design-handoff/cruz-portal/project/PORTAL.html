<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>PORTAL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap">
<link rel="stylesheet" href="styles/tokens.css?v=2">
<link rel="stylesheet" href="styles/components.css?v=6">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body class="cruz-grain">

<div id="root"></div>

<script type="text/babel" src="src/primitives.jsx"></script>
<script type="text/babel" src="src/login-backgrounds.jsx"></script>
<script type="text/babel" src="src/login-arrival-scene.jsx"></script>
<script type="text/babel" src="src/screen-login.jsx"></script>
<script type="text/babel" src="src/screen-dashboard-extras.jsx"></script>
<script type="text/babel" src="src/live-border.jsx"></script>
<script type="text/babel" src="src/screen-dashboard.jsx"></script>
<script type="text/babel" src="src/screen-detail-system.jsx"></script>
<script type="text/babel" src="src/tweaks.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "screen": "detail",
  "accent": "lime",
  "bg": "void",
  "density": "spacious",
  "typePair": "editorial",
  "motion": "on",
  "tour": true
}/*EDITMODE-END*/;

const { useState, useEffect, useMemo, useRef } = React;

function App() {
  const [state, setState] = useState(() => {
    try {
      const saved = localStorage.getItem('cruz-tweaks');
      return saved ? { ...TWEAK_DEFAULTS, ...JSON.parse(saved) } : TWEAK_DEFAULTS;
    } catch { return TWEAK_DEFAULTS; }
  });
  const [showTweaks, setShowTweaks] = useState(false);

  useEffect(() => {
    const root = document.documentElement;
    root.dataset.accent = state.accent;
    root.dataset.bg = state.bg;
    root.dataset.density = state.density;
    root.dataset.type = state.typePair;
    root.dataset.motion = state.motion;
    localStorage.setItem('cruz-tweaks', JSON.stringify(state));
  }, [state]);

  useEffect(() => {
    const handler = (ev) => {
      const d = ev.data || {};
      if (d.type === '__activate_edit_mode') setShowTweaks(true);
      if (d.type === '__deactivate_edit_mode') setShowTweaks(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const setScreen = (s) => setState(prev => ({ ...prev, screen: s }));

  return (
    <>
      {state.screen === 'login' && (
        <div data-screen-label="01 Login">
          <LoginScreen onEnter={() => setScreen('dashboard')}/>
        </div>
      )}
      {state.screen === 'dashboard' && (
        <div data-screen-label="02 Dashboard">
          <DashboardScreen
            onLogout={() => setScreen('login')}
            onOpenDetail={() => setScreen('detail')}
          />
        </div>
      )}
      {state.screen === 'detail' && (
        <div data-screen-label="03 Detail">
          <DetailScreen onBack={() => setScreen('dashboard')}/>
        </div>
      )}
      {state.screen === 'system' && (
        <div data-screen-label="04 System">
          <SystemScreen/>
        </div>
      )}

      {/* Small screen selector always visible bottom-left */}
      <div style={{
        position: 'fixed', left: 20, bottom: 20, zIndex: 50,
        display: 'flex', gap: 4, padding: 4,
        background: 'color-mix(in oklch, var(--cruz-ink-2) 90%, transparent)',
        backdropFilter: 'blur(10px)',
        border: '1px solid var(--cruz-line-2)', borderRadius: 'var(--cruz-r-pill)',
        boxShadow: 'var(--cruz-shadow-2)',
      }}>
        {[
          ['login', 'Login'],
          ['dashboard', 'Dashboard'],
          ['detail', 'Pedimento'],
          ['system', 'System'],
        ].map(([v, l]) => (
          <button key={v} onClick={() => setScreen(v)} style={{
            padding: '6px 12px', borderRadius: 999, fontSize: 'var(--cruz-fs-xs)',
            background: state.screen === v ? 'var(--cruz-fg-1)' : 'transparent',
            color: state.screen === v ? 'var(--cruz-ink-0)' : 'var(--cruz-fg-3)',
            fontWeight: state.screen === v ? 500 : 400,
            transition: 'all 200ms var(--cruz-ease-out)',
          }}>{l}</button>
        ))}
      </div>

      {showTweaks && <TweaksPanel state={state} setState={setState} onClose={() => setShowTweaks(false)}/>}
      {state.tour && state.screen === 'dashboard' && (
        <OnboardingTour onClose={() => setState(prev => ({ ...prev, tour: false }))}/>
      )}
      <button onClick={() => setState(prev => ({ ...prev, tour: true }))} style={{
        position: 'fixed', right: 24, top: 72, zIndex: 45,
        padding: '6px 10px', borderRadius: 999, fontSize: 'var(--cruz-fs-xs)',
        background: 'var(--cruz-ink-3)', border: '1px solid var(--cruz-line-2)',
        color: 'var(--cruz-fg-3)', display: state.screen === 'dashboard' && !state.tour ? 'inline-flex' : 'none',
        alignItems: 'center', gap: 6,
      }}><span style={{ width: 5, height: 5, borderRadius: 999, background: 'var(--cruz-green-2)' }}/> Tour</button>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
