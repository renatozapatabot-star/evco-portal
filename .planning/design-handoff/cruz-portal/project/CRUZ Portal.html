<!doctype html>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CRUZ — Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,200;9..144,300;9..144,400;9..144,500&amp;family=Inter+Tight:wght@300;400;500;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap">
<link rel="stylesheet" href="styles/tokens.css">
<link rel="stylesheet" href="styles/components.css?v=3">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<body class="cruz-grain">

<div id="root"></div>

<script type="text/babel" src="src/primitives.jsx" data-plugins="transform-react-jsx-source" data-filename="src/primitives.jsx"></script>
<script type="text/babel" src="src/login-backgrounds.jsx" data-plugins="transform-react-jsx-source" data-filename="src/login-backgrounds.jsx"></script>
<script type="text/babel" src="src/screen-login.jsx" data-plugins="transform-react-jsx-source" data-filename="src/screen-login.jsx"></script>
<script type="text/babel" src="src/live-border.jsx" data-plugins="transform-react-jsx-source" data-filename="src/live-border.jsx"></script>
<script type="text/babel" src="src/pedimento-theater.jsx" data-plugins="transform-react-jsx-source" data-filename="src/pedimento-theater.jsx"></script>
<script type="text/babel" src="src/screen-dashboard-extras.jsx" data-plugins="transform-react-jsx-source" data-filename="src/screen-dashboard-extras.jsx"></script>
<script type="text/babel" src="src/screen-dashboard.jsx" data-plugins="transform-react-jsx-source" data-filename="src/screen-dashboard.jsx"></script>
<script type="text/babel" src="src/screen-detail-system.jsx" data-plugins="transform-react-jsx-source" data-filename="src/screen-detail-system.jsx"></script>
<script type="text/babel" src="src/tweaks.jsx" data-plugins="transform-react-jsx-source" data-filename="src/tweaks.jsx"></script>

<script type="text/babel" data-plugins="transform-react-jsx-source" data-filename="inline-app">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "screen": "login",
  "accent": "lime",
  "bg": "void",
  "density": "comfortable",
  "typePair": "editorial",
  "motion": "on"
}/*EDITMODE-END*/;

const { useState, useEffect } = React;

function App() {
  const [state, setState] = useState(() => {
    try {
      const saved = localStorage.getItem('cruz-tweaks');
      return saved ? { ...TWEAK_DEFAULTS, ...JSON.parse(saved) } : TWEAK_DEFAULTS;
    } catch { return TWEAK_DEFAULTS; }
  });
  const [showTweaks, setShowTweaks] = useState(false);

  useEffect(() => {
    const root = document.documentElement;
    root.dataset.accent = state.accent;
    root.dataset.bg = state.bg;
    root.dataset.density = state.density;
    root.dataset.type = state.typePair;
    root.dataset.motion = state.motion;
    localStorage.setItem('cruz-tweaks', JSON.stringify(state));
  }, [state]);

  useEffect(() => {
    const handler = (ev) => {
      const d = ev.data || {};
      if (d.type === '__activate_edit_mode') setShowTweaks(true);
      if (d.type === '__deactivate_edit_mode') setShowTweaks(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const setScreen = (s) => setState(prev => ({ ...prev, screen: s }));

  return (
    <>
      {state.screen === 'login' && (
        <div data-screen-label="01 Login">
          <LoginScreen onEnter={() => setScreen('dashboard')}/>
        </div>
      )}
      {state.screen === 'dashboard' && (
        <div data-screen-label="02 Dashboard">
          <DashboardScreen
            onLogout={() => setScreen('login')}
            onOpenDetail={() => setScreen('detail')}
          />
        </div>
      )}
      {state.screen === 'detail' && (
        <div data-screen-label="03 Detail">
          <DetailScreen onBack={() => setScreen('dashboard')}/>
        </div>
      )}
      {state.screen === 'system' && (
        <div data-screen-label="04 System">
          <SystemScreen/>
        </div>
      )}

      <PedimentoTheater/>

      {/* Small screen selector bottom-left */}
      <div style={{
        position: 'fixed', left: 20, bottom: 20, zIndex: 50,
        display: 'flex', gap: 4, padding: 4,
        background: 'color-mix(in oklch, var(--cruz-ink-2) 90%, transparent)',
        backdropFilter: 'blur(10px)',
        border: '1px solid var(--cruz-line-2)', borderRadius: 'var(--cruz-r-pill)',
        boxShadow: 'var(--cruz-shadow-2)',
      }}>
        {[
          ['login', 'Login'],
          ['dashboard', 'Dashboard'],
          ['detail', 'Pedimento'],
          ['system', 'System'],
        ].map(([v, l]) => (
          <button key={v} onClick={() => setScreen(v)} style={{
            padding: '6px 12px', borderRadius: 999, fontSize: 'var(--cruz-fs-xs)',
            background: state.screen === v ? 'var(--cruz-fg-1)' : 'transparent',
            color: state.screen === v ? 'var(--cruz-ink-0)' : 'var(--cruz-fg-3)',
            fontWeight: state.screen === v ? 500 : 400,
            transition: 'all 200ms var(--cruz-ease-out)',
          }}>{l}</button>
        ))}
      </div>

      {showTweaks && <TweaksPanel state={state} setState={setState} onClose={() => setShowTweaks(false)}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
