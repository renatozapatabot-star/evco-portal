<?xml version="1.0" encoding="UTF-8"?>
<!--
  ZAPATA AI — canonical brand mark.
  Block-letter Z with 3-stop gold gradient and a subtle top highlight.
  viewBox 0 0 100 100 keeps the mark square so it drops into any
  container (hero, topbar, favicon, nav tile) without distortion.
  Single source of truth — do not fork.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="ZAPATA AI">
  <defs>
    <linearGradient id="z-gold" x1="0" y1="16" x2="0" y2="84" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F4D47A" />
      <stop offset="0.45" stop-color="#C9A74A" />
      <stop offset="1" stop-color="#8F7628" />
    </linearGradient>
    <linearGradient id="z-sheen" x1="0" y1="16" x2="0" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF3BE" stop-opacity="0.55" />
      <stop offset="1" stop-color="#FFF3BE" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="z-edge" x1="0" y1="0" x2="0" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFE9A3" stop-opacity="0.45" />
      <stop offset="1" stop-color="#5C4C18" stop-opacity="0.45" />
    </linearGradient>
  </defs>

  <!-- Block Z — three solid polygons unioned: top bar, diagonal, bottom bar. -->
  <g fill="url(#z-gold)" stroke="url(#z-edge)" stroke-width="0.75" stroke-linejoin="miter">
    <polygon points="10,16 90,16 90,32 10,32" />
    <polygon points="90,32 70,32 10,68 30,68" />
    <polygon points="10,68 90,68 90,84 10,84" />
  </g>

  <!-- Warm highlight across the top edge for depth. -->
  <polygon points="10,16 90,16 90,23 10,23" fill="url(#z-sheen)" />
</svg>
